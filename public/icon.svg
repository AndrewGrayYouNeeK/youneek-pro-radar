  <line x1="40" y1="256" x2="472" y2="256" stroke="#1e40af" stroke-width="1.5" opacity="0.4"/>
  <!-- Echo blip -->
  <circle cx="360" cy="160" r="6" fill="#f59e0b" opacity="0.9"/>
  <circle cx="360" cy="160" r="10" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
</svg>
