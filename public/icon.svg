<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0f172a"/>
  <!-- Radar rings -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#1e40af" stroke-width="3" opacity="0.6"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#1e40af" stroke-width="3" opacity="0.7"/>
  <circle cx="256" cy="256" r="80" fill="none" stroke="#1e40af" stroke-width="3" opacity="0.8"/>
  <circle cx="256" cy="256" r="20" fill="#3b82f6" opacity="0.9"/>
  <!-- Sweep beam -->
  <path d="M256 256 L456 176" stroke="#22d3ee" stroke-width="3" opacity="0.9"/>
  <path d="M256 256 L256 56" stroke="#22d3ee" stroke-width="1.5" opacity="0.3"/>
